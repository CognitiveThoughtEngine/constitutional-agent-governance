# Constitutional Governance Configuration — Annotated Example
# ---------------------------------------------------------------
# This is a fully annotated example for a content-publishing agent.
# Copy and adapt for your organization.

version: "1.0"
organization: "ExampleOrg"
agent_name: "ContentPublisher"

# Hard constraints for a content-publishing agent.
# These are in addition to BUILTIN_HARD_CONSTRAINTS (which are always enforced).

hard_constraints:
  - id: HC-ORG-1
    description: "No publishing content with flagged toxicity score above threshold"
    check_key: "toxicity_score"
    check_op: "lt"
    check_value: 0.7
    remedy: "Route content to human review before publishing"

  - id: HC-ORG-2
    description: "No API calls to deprecated endpoints"
    check_key: "deprecated_endpoint_calls"
    check_op: "eq"
    check_value: 0
    remedy: "Update all integrations to current API versions"

gates:
  epistemic:
    enabled: true
    # This agent verifies published content gets the expected engagement.
    # If engagement is consistently different from predictions, the agent's
    # content model is unreliable.
    hold_threshold: 0.65
    fail_threshold: 0.45

  risk:
    enabled: true
    # Channel health: fraction of posts that get expected engagement
    # (vs. shadow-banned or rate-limited)
    channel_hold: 0.60
    channel_fail: 0.40

  governance:
    enabled: true
    audit_fail_threshold: 0.95

  economic:
    enabled: true
    stage: "pre_revenue"
    pre_revenue:
      runway_hold_months: 6.0
      runway_fail_months: 3.0
      dli_completion_hold: 0.05
      dli_completion_fail: 0.01
      user_return_rate_hold: 0.10
      user_return_rate_fail: 0.03
      value_demo_hold: 3
      value_demo_fail: 0

  autonomy:
    enabled: true
    # Content agent should make most decisions without human review
    human_minutes_hold: 45.0
    human_minutes_fail: 90.0
    decisions_hold: 20
    decisions_fail: 5

  constitutional:
    enabled: true
    # This agent should document at least 1 lesson per week about
    # what content performs vs. what doesn't
    lessons_hold: 1
    lessons_fail: 0
    amendments_hold: 1
    amendments_fail: 0

# The metrics dict you pass to constitution.evaluate() for this agent:
#
# {
#   # Epistemic
#   "verification_pass_rate": 0.82,       # 82% of content hit predicted engagement
#   "uncertainty_disclosure_rate": 0.95,  # 95% of posts marked with confidence level
#   "assumption_volatility": 0.10,        # Low churn in content model assumptions
#   "disagreement_persistence": 0.05,     # Few unresolved contradictions
#
#   # Risk
#   "misuse_risk_index": 0.05,            # Low harm probability
#   "channel_health": 0.88,               # 88% of posts visible/indexed
#   "security_critical_events": 0,
#   "security_high_events": 0,
#
#   # Governance
#   "control_bypass_attempts": 0,
#   "audit_coverage": 0.97,
#   "test_pass_rate": 0.95,
#
#   # Economic (pre_revenue mode)
#   "stage": "pre_revenue",
#   "runway_months": 8.5,
#   "dli_completion_rate": 0.12,
#   "user_return_rate": 0.22,
#   "value_demo_count": 4,
#
#   # Autonomy
#   "human_minutes_per_day": 25.0,
#   "decisions_per_day": 47,
#   "agent_activation_rate": 0.82,
#   "escalations_per_day": 2,
#   "auto_recovery_rate": 0.91,
#
#   # Constitutional
#   "lessons_learned_weekly": 3,
#   "bug_recurrence_rate": 0.04,
#   "amendments_per_month": 2,
#   "knowledge_freshness": 0.75,
#   "enforcement_coverage": 0.88,
#
#   # Hard constraint context
#   "failing_tests": 0,
#   "hours_since_last_execution": 6,
#   "gate_override_without_amendment": false,
